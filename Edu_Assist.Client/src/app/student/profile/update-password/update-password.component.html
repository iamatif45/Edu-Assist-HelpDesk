<app-student-navbar></app-student-navbar>

<div class="card p-4 mt-4">
    <h3>Change Password</h3>
    <form (ngSubmit)="onChangePassword()">
      <div class="form-group">
        <label for="oldPassword">Old Password:</label>
        <input 
          type="password" 
          id="oldPassword" 
          [(ngModel)]="oldPassword" 
          name="oldPassword" 
          class="form-control" 
          requireda
          [type]="isOldPasswordVisible ? 'text' : 'password'">
        <button type="button" (click)="togglePasswordVisibility('old')" class="btn btn-sm btn-link">Show/Hide</button>
      </div>

      <div class="form-group">
        <label for="newPassword">New Password:</label>
        <input 
          type="password" 
          id="newPassword" 
          [(ngModel)]="newPassword" 
          name="newPassword" 
          class="form-control" 
          required
          [type]="isNewPasswordVisible ? 'text' : 'password'">
        <button type="button" (click)="togglePasswordVisibility('new')" class="btn btn-sm btn-link">Show/Hide</button>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password:</label>
        <input 
          type="password" 
          id="confirmPassword" 
          [(ngModel)]="confirmPassword" 
          name="confirmPassword" 
          class="form-control" 
          required
          [type]="isConfirmPasswordVisible ? 'text' : 'password'">
        <button type="button" (click)="togglePasswordVisibility('confirm')" class="btn btn-sm btn-link">Show/Hide</button>
      </div>

      <!-- Error message display -->
      <div *ngIf="passwordError" class="text-danger">
        {{ passwordError }}
      </div>

      <!-- Success message display -->
      <div *ngIf="passwordSuccessMessage" class="text-success">
        {{ passwordSuccessMessage }}
      </div>

      <div class="form-group mt-3">
        <button type="submit" class="btn btn-primary">Change Password</button>
      </div>
    </form>
</div>
